<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hue Dash - 色彩辨識挑戰</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; }
        #game-container { max-width: 500px; width: 90%; margin-top: 50px; text-align: center; }
        #color-target { width: 100px; height: 100px; border-radius: 15px; margin: 20px auto; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .tile { aspect-ratio: 1; border-radius: 10px; cursor: pointer; transition: transform 0.1s; border: 2px solid transparent; }
        .tile:hover { transform: scale(1.05); }
        .info { font-size: 1.2rem; font-weight: bold; color: #333; }
        #timer { color: #e74c3c; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Hue Dash</h1>
    <div class="info">分數: <span id="score">0</span> | 時間: <span id="timer">15</span>s</div>
    <div id="color-target"></div>
    <p>找出下方最接近上方格子的顏色！</p>
    <div id="grid"></div>
</div>

<script>
    let score = 0;
    let timeLeft = 15;
    let timer;
    let targetColor = {};
    const grid = document.getElementById('grid');
    const targetDisplay = document.getElementById('color-target');

    function initGame() {
        score = 0;
        timeLeft = 15;
        updateUI();
        nextLevel();
        timer = setInterval(countDown, 1000);
    }

    function generateRandomColor() {
        return {
            r: Math.floor(Math.random() * 255),
            g: Math.floor(Math.random() * 255),
            b: Math.floor(Math.random() * 255)
        };
    }

    function nextLevel() {
        grid.innerHTML = '';
        targetColor = generateRandomColor();
        targetDisplay.style.backgroundColor = `rgb(${targetColor.r}, ${targetColor.g}, ${targetColor.b})`;

        // 決定正確答案的位置
        const correctIndex = Math.floor(Math.random() * 9);
        // 隨著分數越高，難度（色差）越小
        const difficulty = Math.max(10, 60 - Math.floor(score / 2) * 5);

        for (let i = 0; i < 9; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            
            if (i === correctIndex) {
                tile.style.backgroundColor = `rgb(${targetColor.r}, ${targetColor.g}, ${targetColor.b})`;
                tile.onclick = () => {
                    score++;
                    timeLeft += 2; // 答對獎勵時間
                    updateUI();
                    nextLevel();
                };
            } else {
                // 生成干擾色
                const offsetR = (Math.random() > 0.5 ? 1 : -1) * difficulty;
                const offsetG = (Math.random() > 0.5 ? 1 : -1) * difficulty;
                const offsetB = (Math.random() > 0.5 ? 1 : -1) * difficulty;
                tile.style.backgroundColor = `rgb(${targetColor.r + offsetR}, ${targetColor.g + offsetG}, ${targetColor.b + offsetB})`;
                tile.onclick = () => {
                    timeLeft -= 3; // 答錯扣時間
                    updateUI();
                };
            }
            grid.appendChild(tile);
        }
    }

    function countDown() {
        timeLeft--;
        updateUI();
        if (timeLeft <= 0) {
            clearInterval(timer);
            alert(`遊戲結束！你的得分是：${score}`);
            initGame();
        }
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('timer').innerText = timeLeft;
    }

    initGame();
</script>
</body>
</html>
