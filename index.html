<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實時顏色辨識遊戲</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; margin: 0; padding: 20px; }
        #game-container { max-width: 500px; margin: auto; }
        canvas { width: 100%; border-radius: 15px; border: 4px solid #444; }
        .info { font-size: 1.5rem; margin: 20px 0; }
        #target-display { display: inline-block; width: 30px; height: 30px; vertical-align: middle; border-radius: 50%; border: 2px solid white; }
        .hint { color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="game-container">
    <h2>🎯 顏色追蹤挑戰</h2>
    <div class="info">
        目標：找尋 <span id="target-name" style="font-weight:bold;">紅色</span> 
        <div id="target-display" style="background: red;"></div>
    </div>
    
    <div style="position: relative;">
        <video id="video" playsinline style="display:none;"></video>
        <canvas id="canvas"></canvas>
    </div>

    <div id="status" class="info" style="color: #00ff00;">請對準顏色...</div>
    <p class="hint">將圓圈中心對準現實生活中的物品即可辨識</p>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const targetName = document.getElementById('target-name');
    const targetDisplay = document.getElementById('target-display');
    const statusText = document.getElementById('status');

    const levels = [
        { name: "紅色", r: 255, g: 0, b: 0 },
        { name: "綠色", r: 0, g: 255, b: 0 },
        { name: "藍色", r: 0, g: 0, b: 255 }
    ];

    let currentLevel = 0;
    let cooldown = false;

    // 啟動相機
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
        video.srcObject = stream;
        video.play();
        requestAnimationFrame(update);
    });

    function update() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 1. 取得中心點座標
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // 2. 取得中心點周圍 5x5 像素的平均顏色
            const pixelData = ctx.getImageData(centerX - 2, centerY - 2, 5, 5).data;
            let r = 0, g = 0, b = 0;
            for (let i = 0; i < pixelData.length; i += 4) {
                r += pixelData[i];
                g += pixelData[i+1];
                b += pixelData[i+2];
            }
            r = Math.floor(r / (pixelData.length / 4));
            g = Math.floor(g / (pixelData.length / 4));
            b = Math.floor(b / (pixelData.length / 4));

            // 3. 畫出中心圓圈（準星）
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fill();

            // 4. 辨識邏輯
            if (!cooldown) {
                checkColor(r, g, b);
            }
        }
        requestAnimationFrame(update);
    }

    function checkColor(r, g, b) {
        const target = levels[currentLevel];
        
        // 簡單判定：目標顏色數值是否佔據主導地位
        let isMatch = false;
        if (target.name === "紅色" && r > g * 1.5 && r > b * 1.5 && r > 100) isMatch = true;
        if (target.name === "綠色" && g > r * 1.2 && g > b * 1.2 && g > 80) isMatch = true;
        if (target.name === "藍色" && b > r * 1.5 && b > g * 1.5 && b > 80) isMatch = true;

        if (isMatch) {
            cooldown = true;
            statusText.innerText = `✅ 成功！這是${target.name}`;
            speak(`太棒了！你找到了${target.name}`);
            
            setTimeout(() => {
                currentLevel = (currentLevel + 1) % levels.length;
                targetName.innerText = levels[currentLevel].name;
                targetDisplay.style.backgroundColor = `rgb(${levels[currentLevel].r},${levels[currentLevel].g},${levels[currentLevel].b})`;
                statusText.innerText = "尋找下一個顏色...";
                cooldown = false;
            }, 3000);
        }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
