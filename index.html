<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 顏色遊戲</title>
    <!-- 引入 QR Code 辨識庫 -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding: 20px; }
        #game-container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #preview { width: 100%; border-radius: 10px; background: #333; margin-top: 10px; }
        #color-box { width: 150px; height: 150px; margin: 20px auto; border: 5px solid #333; border-radius: 10px; transition: 0.5s; }
        .status { font-size: 1.2rem; font-weight: bold; margin: 10px 0; color: #555; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <h2>🎨 QR Code 互動著色</h2>
    <div id="color-box"></div>
    <div class="status" id="status">正在載入相機...</div>
    <div class="status" id="target">目標：請找 <span id="target-color">紅色 (Red)</span></div>
    
    <!-- 攝影機畫面 -->
    <video id="video" playsinline style="display:none;"></video>
    <canvas id="canvas" style="width: 100%; border-radius: 10px;"></canvas>
    
    <p><button onclick="nextLevel()" id="next-btn" style="display:none;">進入下一關</button></p>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');
    const targetText = document.getElementById('target-color');
    const colorBox = document.getElementById('color-box');
    const nextBtn = document.getElementById('next-btn');

    const levels = [
        { name: "紅色", target: "Red", hex: "#FF0000" },
        { name: "綠色", target: "Green", hex: "#00FF00" },
        { name: "藍色", target: "Blue", hex: "#0000FF" }
    ];

    let currentLevel = 0;
    let isFinished = false;

    // 啟動攝影機
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        requestAnimationFrame(tick);
    });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 抓取畫面進行辨識
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code && !isFinished) {
                const result = code.data.trim().toLowerCase();
                const target = levels[currentLevel].target.toLowerCase();

                if (result === target) {
                    win();
                } else {
                    statusText.innerText = "偵測到：" + result + " (不對喔！)";
                }
            } else if (!isFinished) {
                statusText.innerText = "請將 QR Code 對準鏡頭";
            }
        }
        requestAnimationFrame(tick);
    }

    function win() {
        isFinished = true;
        colorBox.style.backgroundColor = levels[currentLevel].hex;
        statusText.innerText = "恭喜答對了！🎉";
        nextBtn.style.display = "inline-block";
        
        // 語音播放 (瀏覽器內建)
        const speech = new SpeechSynthesisUtterance("答對了！變成" + levels[currentLevel].name + "了！");
        speech.lang = 'zh-TW';
        window.speechSynthesis.speak(speech);
    }

    function nextLevel() {
        currentLevel = (currentLevel + 1) % levels.length;
        isFinished = false;
        colorBox.style.backgroundColor = "#999";
        targetText.innerText = levels[currentLevel].name + " (" + levels[currentLevel].target + ")";
        nextBtn.style.display = "none";
    }

    // 初始化背景色
    colorBox.style.backgroundColor = "#999";
</script>

</body>
</html>
