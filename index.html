<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>色彩挑戰 - 魔法畫筆</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #game-container { text-align: center; width: 100%; }
        .green-text { color: #2ecc71; font-weight: bold; }
        
        .canvas-wrapper { position: relative; width: 300px; height: 300px; margin: 20px auto; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* 1. 【修改】底圖改為只有灰色線條或輪廓的圖片（或用 filter 變灰） */
        #target-img { 
            width: 200px; height: 200px; 
            position: absolute; top: 50px; left: 50px; z-index: 1; 
            /* 使用 CSS 濾鏡讓原圖變灰，模擬沒顏色的狀態 */
            filter: grayscale(100%) opacity(0.5); 
        }
        
        #paint-canvas { position: absolute; top: 0; left: 0; z-index: 2; border-radius: 20px; cursor: crosshair; }
        
        #palette { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .brush { width: 60px; height: 100px; border-radius: 10px 10px 5px 5px; position: relative; cursor: pointer; transition: transform 0.2s; }
        .brush:hover { transform: translateY(-5px); }
        .brush::after { content: ""; position: absolute; top: -15px; left: 5px; width: 50px; height: 30px; border-radius: 50% 50% 0 0; }
        .red { background: #ff7675; } .red::after { background: #d63031; }
        .green { background: #55efc4; border: 3px solid #333; } .green::after { background: #00b894; }
        .blue { background: #74b9ff; } .blue::after { background: #0984e3; }
        .label { margin-top: 110px; font-weight: bold; font-size: 14px; }
        
        #success-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(46, 204, 113, 0.98); /* 稍微加深一點綠色 */
            flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; 
        }
        
        /* 2. 【新增】答對回饋時顯示的彩色圖片樣式 */
        #success-leaf-img {
            width: 250px; height: 250px;
            margin: 20px 0;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            /* 預設彩色，不需濾鏡 */
        }

        #success-overlay button { 
            padding: 12px 24px; font-size: 20px; border: none; border-radius: 30px; 
            cursor: pointer; background: white; color: #2ecc71; font-weight: bold;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1); transition: all 0.2s;
        }
        #success-overlay button:hover { transform: scale(1.1); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>請選 <span class="green-text">綠色畫筆</span> 塗滿葉子！</h1>
        <div class="canvas-wrapper">
            <!-- 3. 【修改】這裡是底下的「沒顏色」參考圖 -->
            <img src="https://cdn-icons-png.flaticon.com/512/892/892926.png" id="target-img">
            <canvas id="paint-canvas"></canvas>
        </div>
        <div id="palette">
            <div class="brush red" onclick="checkColor('red')"><div class="label">紅色</div></div>
            <div class="brush green" onclick="checkColor('green')"><div class="label">綠色</div></div>
            <div class="brush blue" onclick="checkColor('blue')"><div class="label">藍色</div></div>
        </div>
    </div>
    
    <div id="success-overlay">
        <h1>恭喜答對！！</h1>
        <p>太棒了！這就是綠色 Green 的葉子！</p>
        
        <!-- 4. 【新增】答對回饋時顯示的彩色圖片 HTML -->
        <img src="https://cdn-icons-png.flaticon.com/512/892/892926.png" id="success-leaf-img" alt="彩色葉子">
        
        <button onclick="location.reload()">再玩一次</button>
    </div>
    
    <script>
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        // 5. 【新增】取得成功畫面中的彩色圖片元素
        const successLeafImg = document.getElementById('success-leaf-img');
        let isSelectedGreen = false, isDrawing = false;
        
        function initCanvas() {
            canvas.width = 300; canvas.height = 300;
            
            // 遊戲開始時，先將成功畫面中的圖片隱藏（雖然 overlay 已經 dispaly: none，但為了嚴謹性）
            successLeafImg.style.display = 'none';

            // 6. 【修改】調整灰色遮罩，讓它更像一個「等待被塗上顏色」的蟬翼或影子
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#e0e0e0'; // 淺灰色
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#7f8c8d"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("請在葉子區域著色", 150, 150);
            
            ctx.globalCompositeOperation = 'destination-out';
        }
        
        function speak(text) { const msg = new SpeechSynthesisUtterance(text); msg.lang = 'zh-TW'; window.speechSynthesis.speak(msg); }
        
        function checkColor(color) {
            // 在點擊畫筆時加上視覺回饋
            event.currentTarget.style.transform = 'translateY(-10px)';
            setTimeout(() => { event.target.closest('.brush').style.transform = ''; }, 200);

            if (color === 'green') { 
                isSelectedGreen = true; 
                speak("正確！綠色 Green，快開始塗色！"); 
            } else { 
                isSelectedGreen = false; 
                speak("這不是綠色喔，再找找看"); 
            }
        }
        
        function draw(e) {
            if (!isDrawing || !isSelectedGreen) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const clientY = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            ctx.beginPath(); 
            // 7. 【修改】調整筆觸大小和形狀，讓塗抹更有趣
            ctx.arc(clientX, clientY, 25, 0, Math.PI * 2); 
            ctx.fill();
            
            checkProgress();
        }
        
        function checkProgress() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clearPixels = 0;
            for (let i = 3; i < pixels.length; i += 4) { if (pixels[i] === 0) clearPixels++; }
            
            // 8. 【修改】判定標準，塗抹約 65% 時成功
            if (clearPixels > (pixels.length / 4) * 0.65) { 
                showSuccess(); 
            }
        }

        // 9. 【新增】專門處理答對後的畫面顯示
        function showSuccess() {
            // (1) 顯示成功畫面
            document.getElementById('success-overlay').style.display = 'flex'; 
            
            // (2) 關鍵：將成功畫面中的彩色圖片設為顯示
            successLeafImg.style.display = 'block'; 
            
            speak("恭喜答對，太棒了"); 
        }
        
        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; draw(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); }, {passive: false});
        
        window.onload = initCanvas;
    </script>
</body>
</html>
