<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>色彩挑戰 - 魔法畫筆</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #game-container { text-align: center; width: 100%; }
        .green-text { color: #2ecc71; font-weight: bold; }
        
        .canvas-wrapper { position: relative; width: 300px; height: 300px; margin: 20px auto; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #target-img { width: 200px; height: 200px; position: absolute; top: 50px; left: 50px; z-index: 1; }
        #paint-canvas { position: absolute; top: 0; left: 0; z-index: 2; border-radius: 20px; cursor: crosshair; }
        
        #palette { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .brush { width: 60px; height: 100px; border-radius: 10px 10px 5px 5px; position: relative; cursor: pointer; transition: transform 0.2s; }
        .brush::after { content: ""; position: absolute; top: -15px; left: 5px; width: 50px; height: 30px; border-radius: 50% 50% 0 0; }
        .red { background: #ff7675; } .red::after { background: #d63031; }
        .green { background: #55efc4; border: 3px solid #2ecc71; } .green::after { background: #00b894; }
        .blue { background: #74b9ff; } .blue::after { background: #0984e3; }
        .label { margin-top: 110px; font-weight: bold; font-size: 14px; color: #636e72; }

        /* 成功畫面修改：改為毛玻璃質感，並讓葉子圖片成為主角 */
        #success-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(255, 255, 255, 0.9); /* 白色半透明背景 */
            backdrop-filter: blur(8px); /* 輕微模糊背景 */
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            animation: fadeIn 0.5s ease;
        }

        .success-card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        #result-leaf {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            animation: bounce 2s infinite; /* 讓葉子跳動 */
        }

        #success-overlay h1 { color: #2ecc71; margin: 10px 0; }
        #success-overlay p { color: #7f8c8d; font-size: 18px; margin-bottom: 20px; }

        #success-overlay button { 
            padding: 12px 30px; font-size: 18px; border: none; border-radius: 50px; 
            cursor: pointer; background: #2ecc71; color: white; font-weight: bold;
            transition: transform 0.2s;
        }
        #success-overlay button:active { transform: scale(0.9); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>請選 <span class="green-text">綠色畫筆</span> 塗滿葉子！</h1>
        <div class="canvas-wrapper">
            <img src="https://cdn-icons-png.flaticon.com/512/892/892926.png" id="target-img">
            <canvas id="paint-canvas"></canvas>
        </div>
        <div id="palette">
            <div class="brush red" onclick="checkColor('red')"><div class="label">紅色</div></div>
            <div class="brush green" onclick="checkColor('green')"><div class="label">綠色</div></div>
            <div class="brush blue" onclick="checkColor('blue')"><div class="label">藍色</div></div>
        </div>
    </div>

    <!-- 修改後的答對回饋畫面 -->
    <div id="success-overlay">
        <div class="success-card">
            <img src="https://cdn-icons-png.flaticon.com/512/892/892926.png" id="result-leaf">
            <h1>恭喜答對！！</h1>
            <p>葉子就是綠色的 Green！</p>
            <button onclick="location.reload()">再玩一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        let isSelectedGreen = false, isDrawing = false;

        function initCanvas() {
            canvas.width = 300; canvas.height = 300;
            ctx.globalCompositeOperation = 'source-over';
            
            // 初始灰色遮罩
            ctx.fillStyle = '#dfe6e9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 提示文字
            ctx.fillStyle = "#b2bec3"; 
            ctx.font = "bold 18px sans-serif"; 
            ctx.textAlign = "center";
            ctx.fillText("選好綠色畫筆", 150, 140);
            ctx.fillText("在這裡塗一塗", 150, 170);
            
            ctx.globalCompositeOperation = 'destination-out';
        }

        function speak(text) { 
            const msg = new SpeechSynthesisUtterance(text); 
            msg.lang = 'zh-TW'; 
            window.speechSynthesis.speak(msg); 
        }

        function checkColor(color) {
            if (color === 'green') { 
                isSelectedGreen = true; 
                speak("正確！請開始塗色！"); 
            } else { 
                isSelectedGreen = false; 
                speak("這不是綠色喔，再找找看"); 
            }
        }

        function draw(e) {
            if (!isDrawing || !isSelectedGreen) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const clientY = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            ctx.beginPath(); 
            ctx.arc(clientX, clientY, 35, 0, Math.PI * 2); 
            ctx.fill();
            checkProgress();
        }

        function checkProgress() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clearPixels = 0;
            for (let i = 3; i < pixels.length; i += 4) { if (pixels[i] === 0) clearPixels++; }
            
            // 當塗開面積超過 60%
            if (clearPixels > (pixels.length / 4) * 0.6) { 
                document.getElementById('success-overlay').style.display = 'flex'; 
                speak("恭喜答對！你畫得真漂亮！"); 
                isDrawing = false;
            }
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; draw(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); }, {passive: false});
        
        window.onload = initCanvas;
    </script>
</body>
</html>
