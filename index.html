<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩挑戰 - 綠色關卡</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/tracking-min.js"></script>
</head>
<body>

    <div id="game-ui">
        <h1 id="status-text">請找出一個 <span class="highlight">綠色 Green</span> 的物品！</h1>
        
        <div id="color-circle">
            <span id="center-text">綠色<br>Green</span>
        </div>

        <div id="hint-container">
            <div class="hint-item">🐸 青蛙</div>
            <div class="hint-item">🍃 葉子</div>
            <div class="hint-item">🍇 葡萄</div>
        </div>
    </div>

    <div class="video-container">
        <video id="webcam" preload autoplay loop muted></video>
        <canvas id="detection-canvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
