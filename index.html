<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>色彩挑戰 - 魔法畫筆</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #game-container { text-align: center; width: 100%; }
        .green-text { color: #2ecc71; font-weight: bold; }
        .canvas-wrapper { position: relative; width: 300px; height: 300px; margin: 20px auto; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #target-img { width: 200px; height: 200px; position: absolute; top: 50px; left: 50px; z-index: 1; }
        #paint-canvas { position: absolute; top: 0; left: 0; z-index: 2; border-radius: 20px; cursor: crosshair; }
        #palette { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .brush { width: 60px; height: 100px; border-radius: 10px 10px 5px 5px; position: relative; cursor: pointer; transition: transform 0.2s; }
        .brush::after { content: ""; position: absolute; top: -15px; left: 5px; width: 50px; height: 30px; border-radius: 50% 50% 0 0; }
        .red { background: #ff7675; } .red::after { background: #d63031; }
        .green { background: #55efc4; border: 3px solid #00b894; } .green::after { background: #00b894; }
        .blue { background: #74b9ff; } .blue::after { background: #0984e3; }
        .label { margin-top: 110px; font-weight: bold; font-size: 14px; }
        #success-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(46, 204, 113, 0.95); flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
        #success-overlay button { padding: 10px 20px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; background: white; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>請選 <span class="green-text">綠色畫筆</span> 塗滿葉子！</h1>
        <div class="canvas-wrapper">
            <img src="https://cdn-icons-png.flaticon.com/512/892/892926.png" id="target-img">
            <canvas id="paint-canvas"></canvas>
        </div>
        <div id="palette">
            <div class="brush red" onclick="checkColor('red')"><div class="label">紅色</div></div>
            <div class="brush green" onclick="checkColor('green')"><div class="label">綠色</div></div>
            <div class="brush blue" onclick="checkColor('blue')"><div class="label">藍色</div></div>
        </div>
    </div>
    <div id="success-overlay">
        <h1>恭喜答對！！</h1>
        <p>太棒了！葉子是綠色 Green！</p>
        <button onclick="location.reload()">再玩一次</button>
    </div>
    <script>
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        let isSelectedGreen = false, isDrawing = false;
        function initCanvas() {
            canvas.width = 300; canvas.height = 300;
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#d1d8e0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#7f8c8d"; ctx.font = "18px Arial"; ctx.textAlign = "center";
            ctx.fillText("選好畫筆後開始塗色", 150, 150);
            ctx.globalCompositeOperation = 'destination-out';
        }
        function speak(text) { const msg = new SpeechSynthesisUtterance(text); msg.lang = 'zh-TW'; window.speechSynthesis.speak(msg); }
        function checkColor(color) {
            if (color === 'green') { isSelectedGreen = true; speak("正確！請開始塗色！"); }
            else { isSelectedGreen = false; speak("這不是綠色喔"); }
        }
        function draw(e) {
            if (!isDrawing || !isSelectedGreen) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            ctx.beginPath(); ctx.arc(clientX - rect.left, clientY - rect.top, 30, 0, Math.PI * 2); ctx.fill();
            checkProgress();
        }
        function checkProgress() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clearPixels = 0;
            for (let i = 3; i < pixels.length; i += 4) { if (pixels[i] === 0) clearPixels++; }
            if (clearPixels > (pixels.length / 4) * 0.6) { document.getElementById('success-overlay').style.display = 'flex'; speak("恭喜答對"); }
        }
        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; draw(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); }, {passive: false});
        window.onload = initCanvas;
    </script>
</body>
</html>
